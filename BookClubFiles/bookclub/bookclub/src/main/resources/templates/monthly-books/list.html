<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Monthly Books</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

<div th:insert="~{fragments/header :: header}"></div>

<div class="container mt-4">
    <h2>Monthly Books</h2>

    <a th:href="@{/monthly-books/new}" class="btn btn-primary mb-3">
        New Monthly Book
    </a>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Month</th>
                <th>ISBN</th>
                <th>Functions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="book : ${booksOfTheMonth}">
                <td th:text="${book.month}"></td>
                <td th:text="${book.isbn}"></td>
                <td>
                    <a th:href="@{/monthly-books/remove/{id}(id=${book.id})}">
                        Delete
                    </a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<div th:insert="~{fragments/footer :: footer}"></div>
<div th:insert="~{fragments/scriptFooter :: scriptFooter}"></div>

</body>
</html>
