<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New Monthly Book</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

<div th:insert="~{fragments/header :: header}"></div>

<div class="container mt-4">
    <h2>New Monthly Book</h2>

    <form th:action="@{/monthly-books}" th:object="${bookOfTheMonth}" method="post">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="mb-3">
            <label class="form-label">Month</label>
            <select th:field="*{month}" class="form-select">
                <option value="">Select a month</option>
                <option th:each="month : ${months}"
                        th:value="${month.key}"
                        th:text="${month.value}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">ISBN</label>
            <input type="text" th:field="*{isbn}" class="form-control" />
            <div style="color:red" th:errors="*{isbn}"></div>
        </div>

        <button type="submit" class="btn btn-success">Submit</button>
        <a th:href="@{/monthly-books}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

<div th:insert="~{fragments/footer :: footer}"></div>
<div th:insert="~{fragments/scriptFooter :: scriptFooter}"></div>

</body>
</html>
