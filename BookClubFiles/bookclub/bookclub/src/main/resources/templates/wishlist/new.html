<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New Wishlist Item</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h2>Add Wishlist Item</h2>

    <form th:action="@{/wishlist}" th:object="${wishlistItem}" method="post">

        <div class="mb-3">
            <label>ISBN</label>
            <input type="text" th:field="*{isbn}" class="form-control" />
            <div style="color:red" th:errors="*{isbn}"></div>
        </div>

        <div class="mb-3">
            <label>Title</label>
            <input type="text" th:field="*{title}" class="form-control" />
            <div style="color:red" th:errors="*{title}"></div>
        </div>

        <button type="submit" class="btn btn-success">Submit</button>
    </form>

    <br/>
    <a th:href="@{/wishlist}">Return to wishlist</a>

</div>
</body>
</html>
