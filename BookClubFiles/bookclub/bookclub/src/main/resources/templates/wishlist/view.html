<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Wishlist Item</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div th:insert="~{fragments/header :: header}"></div>

<div class="container mt-4">
    <h2>Edit Wishlist Item</h2>

    <form th:action="@{/wishlist/update}" th:object="${wishlistItem}" method="post">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" th:field="*{id}" />
        <input type="hidden" th:field="*{username}" />

        <div class="mb-3">
            <label>ISBN</label>
            <input type="text" th:field="*{isbn}" class="form-control" />
            <div style="color:red" th:errors="*{isbn}"></div>
        </div>

        <div class="mb-3">
            <label>Title</label>
            <input type="text" th:field="*{title}" class="form-control" />
            <div style="color:red" th:errors="*{title}"></div>
        </div>

        <button type="submit" class="btn btn-success">Update</button>
        <a th:href="@{/wishlist}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

<div th:insert="~{fragments/footer :: footer}"></div>
<div th:insert="~{fragments/scriptFooter :: scriptFooter}"></div>

</body>
</html>
