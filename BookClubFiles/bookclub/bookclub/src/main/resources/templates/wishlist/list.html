<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Wishlist</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

<div th:insert="~{fragments/header :: header}"></div>

<div class="container mt-4">
    <h2>Wishlist</h2>

    <a th:href="@{/wishlist/new}" class="btn btn-primary mb-3">
        New Wishlist Item
    </a>

    <div id="wishlist"></div>
</div>

<script>
class HttpClient {
    async get(url) {
        const response = await fetch(url, {
            method: 'GET'
        });

        return response.json();
    }
}

function buildTable(books) {
    let tableString = `<table class="table table-striped"><tr><th>ISBN</th><th>Title</th><th>Functions</th></tr>`;

    for (let book of books) {
        tableString += `<tr><td>${book.isbn}</td><td>${book.title}</td><td><a href="/wishlist/${book.id}">Edit</a> | <a href="/wishlist/remove/${book.id}">Delete</a></td></tr>`;
    }

    tableString += `</table>`;

    return tableString;
}

const http = new HttpClient();

http.get('/api/wishlist')
    .then(res => {
        document.getElementById("wishlist").innerHTML = buildTable(res);
    })
    .catch(error => {
        console.log(error);
    });
</script>

<div th:insert="~{fragments/footer :: footer}"></div>
<div th:insert="~{fragments/scriptFooter :: scriptFooter}"></div>

</body>
</html>
