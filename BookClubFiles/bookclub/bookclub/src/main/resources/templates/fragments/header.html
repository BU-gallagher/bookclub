<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head></head>

<body>
    <header th:fragment="header">
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container-fluid">

                <!-- Brand -->
                <a class="navbar-brand" th:href="@{/}">BookClub</a>

                <!-- Mobile Toggle -->
                <button class="navbar-toggler" type="button"
                        data-bs-toggle="collapse" data-bs-target="#navbarNav"
                        aria-controls="navbarNav" aria-expanded="false"
                        aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Navbar Content -->
                <div class="collapse navbar-collapse" id="navbarNav">

                    <!-- Left Navigation Links -->
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/about}">About Us</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/contact}">Contact Us</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/wishlist}">Wishlist</a>
                        </li>

                        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                            <a class="nav-link" th:href="@{/monthly-books}">
                                Monthly Books
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="/swagger-ui.html" target="_blank">
                                OpenAPI Specification
                            </a>
                        </li>
                    </ul>

                    <!-- Right Side (User + Logout) -->
                    <div class="d-flex align-items-center">
                        <span sec:authentication="name" class="me-3"></span>

                        <form th:action="@{/logout}" method="post">
                            <button class="btn btn-danger btn-sm" type="submit">
                                Logout
                            </button>
                        </form>
                    </div>

                </div>
            </div>
        </nav>
    </header>
</body>
</html>
